<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050005" />
    <meta name="description" content="Team 3181 scouting admin question builder." />
    <title>Admin | 3181 Scouting</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero compact admin-gated hidden" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Team 3181</p>
          <h1 id="app-title">Admin</h1>
          <p class="hero-copy">Manage live scouting questions for every signed-in scout.</p>
        </div>
        <div class="status-pill" id="connectionStatus">Checking</div>
      </section>

      <nav class="top-nav" aria-label="App pages">
        <a class="nav-link" href="scout.html">Scout</a>
        <a class="nav-link admin-only hidden" href="data.html">Data</a>
        <a class="nav-link admin-only hidden active" href="admin.html">Admin</a>
        <button class="nav-link nav-button" id="signOutButton" type="button">Sign out</button>
      </nav>

      <section class="page-panel admin-gated hidden" aria-labelledby="admin-title">
        <div class="section-header">
          <div>
            <p class="eyebrow">Question builder</p>
            <h2 id="admin-title">Edit form</h2>
          </div>
        </div>

        <section class="template-panel" aria-labelledby="template-title">
          <div class="item-topline">
            <div>
              <p class="eyebrow">Templates</p>
              <h3 id="template-title">Saved forms</h3>
            </div>
          </div>
          <div class="template-create">
            <label>
              <span>Template name</span>
              <input id="templateName" />
            </label>
            <button class="primary-button" id="createTemplateButton" type="button">Create template</button>
          </div>
          <div class="template-tabs" id="templateTabs" aria-label="Saved templates"></div>
        </section>

        <section class="template-panel" aria-labelledby="settings-title">
          <div class="item-topline">
            <div>
              <p class="eyebrow">Form settings</p>
              <h3 id="settings-title">Prematch and pages</h3>
            </div>
          </div>
          <form id="formSettingsForm" class="settings-editor">
            <div class="form-grid">
              <label>
                <span>Prematch tab</span>
                <input id="stepPrematchTab" />
              </label>
              <label>
                <span>Prematch title</span>
                <input id="stepPrematchTitle" />
              </label>
              <label>
                <span>Auto tab</span>
                <input id="stepAutoTab" />
              </label>
              <label>
                <span>Auto title</span>
                <input id="stepAutoTitle" />
              </label>
              <label>
                <span>Teleop tab</span>
                <input id="stepTeleopTab" />
              </label>
              <label>
                <span>Teleop title</span>
                <input id="stepTeleopTitle" />
              </label>
              <label>
                <span>Endgame tab</span>
                <input id="stepEndgameTab" />
              </label>
              <label>
                <span>Endgame title</span>
                <input id="stepEndgameTitle" />
              </label>
              <label>
                <span>Review tab</span>
                <input id="stepReviewTab" />
              </label>
              <label>
                <span>Review title</span>
                <input id="stepReviewTitle" />
              </label>
              <label>
                <span>Event label</span>
                <input id="fieldEventCodeLabel" />
              </label>
              <label>
                <span>Match label</span>
                <input id="fieldMatchNumberLabel" />
              </label>
              <label>
                <span>Team label</span>
                <input id="fieldTeamNumberLabel" />
              </label>
              <label>
                <span>Scout label</span>
                <input id="fieldScoutNameLabel" />
              </label>
              <label>
                <span>Alliance options</span>
                <input id="fieldAllianceOptions" />
              </label>
              <label>
                <span>Robot position options</span>
                <input id="fieldStationOptions" />
              </label>
              <label>
                <span>Starting location options</span>
                <input id="fieldStartingLocationOptions" />
              </label>
              <label>
                <span>Preload label</span>
                <input id="fieldPreloadFuelLabel" />
              </label>
              <label>
                <span>Notes label</span>
                <input id="fieldNotesLabel" />
              </label>
            </div>
            <div class="action-row">
              <button class="primary-button" type="submit">Save form settings</button>
              <button class="ghost-button" id="resetSettingsButton" type="button">Reset defaults</button>
            </div>
          </form>
        </section>

        <form id="questionForm" class="question-editor">
          <input type="hidden" id="questionId" />
          <label>
            <span>Question label</span>
            <input id="questionLabel" required />
          </label>
          <div class="form-grid">
            <label>
              <span>Type</span>
              <select id="questionType" required>
                <option value="counter">Counter</option>
                <option value="number">Number</option>
                <option value="select">Select</option>
                <option value="toggle">Toggle</option>
                <option value="text">Text</option>
              </select>
            </label>
            <label>
              <span>Phase</span>
              <select id="questionPhase" required>
                <option value="auto">Auto</option>
                <option value="teleop">Teleop</option>
                <option value="endgame">Endgame</option>
                <option value="overall">Overall</option>
              </select>
            </label>
            <label>
              <span>Order</span>
              <input id="questionOrder" type="number" inputmode="numeric" value="1" required />
            </label>
            <label>
              <span>Required</span>
              <select id="questionRequired">
                <option value="true">Yes</option>
                <option value="false">No</option>
              </select>
            </label>
          </div>
          <label>
            <span>Options for select, comma separated</span>
            <input id="questionOptions" />
          </label>
          <div class="action-row">
            <button class="primary-button" type="submit">Save question</button>
            <button class="ghost-button" id="resetQuestionButton" type="button">New</button>
            <p class="form-status" id="questionStatus" role="status"></p>
          </div>
        </form>

        <div class="admin-list" id="adminQuestionList"></div>
      </section>
    </main>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>No items yet</strong>
        <span>Once Supabase has data, it will appear here.</span>
      </div>
    </template>

    <script type="module" src="src/admin.js?v=no-suggestions-20260420"></script>
  </body>
</html>
