<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050005" />
    <meta name="description" content="Team 3181 mobile FRC scouting login." />
    <title>3181 Scouting Login</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell auth-shell">
      <section class="hero compact" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Team 3181</p>
          <h1 id="app-title">Scouting Login</h1>
          <p class="hero-copy">Sign in with the account your scouting lead made for you.</p>
        </div>
        <div class="status-pill" id="connectionStatus">Ready</div>
      </section>

      <section class="page-panel narrow" aria-labelledby="login-title">
        <div class="section-header">
          <div>
            <p class="eyebrow">Firebase account</p>
            <h2 id="login-title">Sign in</h2>
          </div>
        </div>

        <form class="auth-panel" id="loginForm">
          <label>
            <span>Email</span>
            <input id="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Password</span>
            <input id="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">Enter app</button>
          <p class="form-status" id="authStatus" role="status"></p>
        </form>
      </section>
    </main>

    <script type="module" src="src/login.js"></script>
  </body>
</html>
