<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050005" />
    <meta name="description" content="Team 3181 mobile FRC scouting form." />
    <title>Scout Match | 3181</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero compact" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Team 3181</p>
          <h1 id="app-title">Scout Match</h1>
        </div>
        <div class="status-pill" id="connectionStatus">Checking</div>
      </section>

      <nav class="top-nav" aria-label="App pages">
        <a class="nav-link active" href="scout.html">Scout</a>
        <a class="nav-link admin-only hidden" href="data.html">Data</a>
        <a class="nav-link admin-only hidden" href="admin.html">Admin</a>
        <button class="nav-link nav-button" id="signOutButton" type="button">Sign out</button>
      </nav>

      <section class="page-panel" aria-labelledby="scout-title">
        <div class="section-header">
          <div>
            <p class="eyebrow">Match entry</p>
            <h2 id="scout-title">Scout a robot</h2>
          </div>
          <button class="ghost-button" id="clearDraftButton" type="button">Clear</button>
        </div>

        <form id="scoutForm" class="scout-form">
          <div class="scout-progress" aria-label="Scouting progress">
            <button class="progress-step active" type="button" data-step-target="prematch">Prematch</button>
            <button class="progress-step" type="button" data-step-target="auto">Auto</button>
            <button class="progress-step" type="button" data-step-target="teleop">Teleop</button>
            <button class="progress-step" type="button" data-step-target="endgame">Endgame</button>
            <button class="progress-step" type="button" data-step-target="review">Review</button>
          </div>

          <section class="scout-step active" data-step="prematch" aria-labelledby="prematch-title">
            <p class="eyebrow">Before the match</p>
            <h3 id="prematch-title">Setup</h3>
            <div class="form-grid">
              <label>
                <span>Event</span>
                <input id="eventCode" name="eventCode" autocomplete="off" required />
              </label>
              <label>
                <span>Match</span>
                <input id="matchNumber" name="matchNumber" inputmode="numeric" required />
              </label>
              <label>
                <span>Team</span>
                <input id="teamNumber" name="teamNumber" inputmode="numeric" required />
              </label>
              <label>
                <span>Scout</span>
                <input id="scoutName" name="scoutName" autocomplete="name" required />
              </label>
              <label>
                <span>Alliance</span>
                <select id="alliance" name="alliance" required>
                  <option value="">Choose</option>
                  <option value="red">Red</option>
                  <option value="blue">Blue</option>
                </select>
              </label>
              <label>
                <span>Robot position</span>
                <select id="station" name="station" required>
                  <option value="">Choose</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                </select>
              </label>
              <label>
                <span>Starting location</span>
                <select id="startingLocation" name="startingLocation">
                  <option value="">Choose</option>
                  <option value="left">Left</option>
                  <option value="center">Center</option>
                  <option value="right">Right</option>
                  <option value="source-side">Source side</option>
                  <option value="scoring-side">Scoring side</option>
                </select>
              </label>
            </div>
          </section>

          <section class="scout-step" data-step="auto" aria-labelledby="auto-title">
            <p class="eyebrow">Autonomous</p>
            <h3 id="auto-title">Auto</h3>
            <div class="question-stack" data-phase-stack="auto"></div>
          </section>

          <section class="scout-step" data-step="teleop" aria-labelledby="teleop-title">
            <p class="eyebrow">Driver control</p>
            <h3 id="teleop-title">Teleop</h3>
            <div class="question-stack" data-phase-stack="teleop"></div>
            <div class="question-stack" data-phase-stack="overall"></div>
          </section>

          <section class="scout-step" data-step="endgame" aria-labelledby="endgame-title">
            <p class="eyebrow">Final stretch</p>
            <h3 id="endgame-title">Endgame</h3>
            <div class="question-stack" data-phase-stack="endgame"></div>
          </section>

          <section class="scout-step" data-step="review" aria-labelledby="review-title">
            <p class="eyebrow">Submit</p>
            <h3 id="review-title">Review notes</h3>
            <label class="full-field">
              <span>Extra notes</span>
              <textarea id="notes" name="notes" rows="4" placeholder="Defense, driver skill, weird moments..."></textarea>
            </label>
          </section>

          <div class="action-row">
            <button class="ghost-button" id="prevStepButton" type="button">Back</button>
            <button class="primary-button" id="nextStepButton" type="button">Next</button>
            <button class="primary-button hidden" id="submitButton" type="submit">Submit scouting</button>
            <p class="form-status" id="submitStatus" role="status"></p>
          </div>
        </form>
      </section>
    </main>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>No items yet</strong>
        <span>Once Supabase has data, it will appear here.</span>
      </div>
    </template>

    <script type="module" src="src/scout.js?v=sticky-fields-20260423"></script>
  </body>
</html>
